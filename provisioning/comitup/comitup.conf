# QDRN Radar — comitup captive portal config.
# Docs: https://davesteele.github.io/comitup/man/comitup-conf.5.html

# SSID broadcast when the Pi can't reach a known network.
ap_name: QDRN-Radar-Setup

# Built-in captive-portal web UI (Flask) — joined phones land on it
# automatically. Reach it manually at http://10.41.0.1/
web_service: comitup-web.service

# 0 = quiet, 1 = info, 2 = debug.
verbose: 0
