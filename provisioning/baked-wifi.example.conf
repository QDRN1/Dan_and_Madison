# Pre-baked WiFi networks for QDRN Radar — gitignored counterpart is
# baked-wifi.local.conf. Format: one network per line, SSID and password
# separated by a TAB. Lines starting with # are comments.
#
# These networks get autoconnect=yes and priority=90 (higher than the
# Settings UI which uses 50). The Settings UI hides them unless the SSID
# appears in the current scan, so the friend doesn't see networks they
# shouldn't even know about — but `Remove` still works if it's in range.
#
# Example:
# HomeWiFi	mySecretPassword
# OfficeWiFi	anotherPassword
