# NetworkManager dnsmasq-shared snippet. Applies only when a connection uses
# ipv4.method=shared (i.e. our qdrn-hotspot AP). Redirects every DNS query to
# the Pi's AP IP, so phones' captive-portal probe URLs hit our Flask portal
# instead of the real internet (which they don't have at this point).
address=/#/10.42.0.1
