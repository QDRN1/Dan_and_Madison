# NetworkManager dnsmasq-shared snippet. Applies only when a connection uses
# ipv4.method=shared (i.e. our qdrn-hotspot AP). Two things:
#
# 1. Redirect every DNS query to the Pi's AP IP, so phones' captive-portal
#    probe URLs hit our Flask portal instead of the real internet (which they
#    don't have at this point).
# 2. Force DHCP OFFERs to be broadcast instead of unicast. The Pi on-board WiFi
#    driver in AP mode silently drops unicast packets to stations that haven't
#    completed DHCP yet, so without this the phone never sees the OFFER and
#    spins on "obtaining IP" forever.
address=/#/10.42.0.1
dhcp-broadcast
