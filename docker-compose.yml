# QDRN Radar — full stack for a headless Raspberry Pi 4.
#   ultrafeeder : RTL-SDR decode (readsb) + mlat + community feeds -> aircraft.json
#   fr24feed    : feeds FlightRadar24 (earns the free Business plan)
#   piaware     : feeds FlightAware  (earns the free Enterprise account)
#   qdrn-radar  : our custom QDRN-themed app (map, detail, stats, setup, admin)
#   cloudflared : exposes radar.qdrn.io/md + SSH via a Cloudflare Tunnel
#
# Copy .env.example -> .env and fill it in first.

# Fixed project name so the app container can recreate the feeder services
# (via the mounted compose file) when the friend adds their keys in the wizard.
name: qdrn-radar

services:
  ultrafeeder:
    image: ghcr.io/sdr-enthusiasts/docker-adsb-ultrafeeder:latest
    container_name: ultrafeeder
    hostname: ultrafeeder
    restart: unless-stopped
    device_cgroup_rules:
      - "c 189:* rwm"
    ports:
      - "8088:80" # tar1090 (raw/debug map) — optional, handy for troubleshooting
    environment:
      - TZ=${TZ:-America/Chicago}
      - READSB_DEVICE_TYPE=rtlsdr
      - READSB_GAIN=autogain
      - READSB_LAT=${FEEDER_LAT}
      - READSB_LON=${FEEDER_LON}
      - READSB_ALT=${FEEDER_ALT:-100m}
      - READSB_RX_LOCATION_ACCURACY=2
      - READSB_STATS_RANGE=true
      - UUID=${ULTRAFEEDER_UUID}
      # Feed the friendly community aggregators (free, gives global coverage back):
      - ULTRAFEEDER_CONFIG=
          adsb,feed.adsb.fi,30004,beast_reduce_plus_out;
          adsb,in.adsb.lol,30004,beast_reduce_plus_out;
          adsb,feed.airplanes.live,30004,beast_reduce_plus_out;
          mlat,feed.adsb.fi,31090;
          mlat,in.adsb.lol,31090;
          mlat,feed.airplanes.live,31090
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - uf_globe_history:/var/globe_history
    tmpfs:
      - /run:exec,size=256M
      - /tmp:size=128M

  fr24feed:
    image: ghcr.io/sdr-enthusiasts/docker-flightradar24:latest
    container_name: fr24feed
    restart: unless-stopped
    depends_on: [ultrafeeder]
    # FR24KEY comes from data/feeder.env, which the setup wizard writes. Keep it
    # out of `environment:` so the wizard value isn't overridden by an empty var.
    env_file:
      - ./data/feeder.env
    environment:
      - TZ=${TZ:-America/Chicago}
      - BEASTHOST=ultrafeeder
      - BEASTPORT=30005
      - MLAT=yes

  piaware:
    image: ghcr.io/sdr-enthusiasts/docker-piaware:latest
    container_name: piaware
    restart: unless-stopped
    depends_on: [ultrafeeder]
    # FEEDER_ID comes from data/feeder.env (written by the setup wizard).
    env_file:
      - ./data/feeder.env
    environment:
      - TZ=${TZ:-America/Chicago}
      - BEASTHOST=ultrafeeder
      - BEASTPORT=30005
      - LAT=${FEEDER_LAT}
      - LONG=${FEEDER_LON}

  qdrn-radar:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      args:
        # The host shell substitutes these from `git rev-parse --short HEAD`
        # and `git log -1 --format=%cI`. If unset (someone running `docker
        # compose build` standalone), the Dockerfile defaults kick in.
        QDRN_BUILD_SHA: "${QDRN_BUILD_SHA:-dev}"
        QDRN_BUILD_AT:  "${QDRN_BUILD_AT:-}"
    image: qdrn-radar:latest
    container_name: qdrn-radar
    restart: unless-stopped
    depends_on: [ultrafeeder]
    ports:
      # Local LAN access (e.g. http://<pi-ip>:8080/md). /md/admin stays gated by
      # Cloudflare Access — direct LAN hits lack the header and get a 403.
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - TZ=${TZ:-UTC}
      - BASE_PATH=${BASE_PATH:-/md}
      - PORT=8080
      - AIRCRAFT_JSON_URL=http://ultrafeeder/data/aircraft.json
      - MAP_STYLE_URL_LIGHT=${MAP_STYLE_URL_LIGHT:-https://basemaps.cartocdn.com/gl/positron-gl-style/style.json}
      - MAP_STYLE_URL_DARK=${MAP_STYLE_URL_DARK:-https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json}
      - RECEIVER_LAT=${RECEIVER_LAT}
      - RECEIVER_LON=${RECEIVER_LON}
      - RECEIVER_CITY=${RECEIVER_CITY}
      - RANGE_RINGS_NM=${RANGE_RINGS_NM:-50,100,150}
      - SETUP_PIN=${SETUP_PIN:-1234}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - CF_ACCESS_TEAM_DOMAIN=${CF_ACCESS_TEAM_DOMAIN}
      - CF_ACCESS_AUD=${CF_ACCESS_AUD}
      - FEEDER_ENV_PATH=/app/data/feeder.env
      - STACK_DIR=/app/stack
      - COMPOSE_PROJECT=qdrn-radar
    volumes:
      - ./data:/app/data
      # Lets the admin console inspect/restart sibling containers, and lets the
      # setup wizard recreate the feeders to apply new keys (compose-in-container).
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/app/stack/docker-compose.yml:ro
      - ./.env:/app/stack/.env:ro
      - ./data:/app/stack/data
      # Swap logo/brand art by editing ./brand — no image rebuild needed.
      - ./brand:/app/brand:ro
      # Unix socket to qdrn-netd on the host, so the Settings tab can manage
      # NetworkManager WiFi profiles without nmcli/D-Bus inside the container.
      - /run/qdrn-net.sock:/run/qdrn-net.sock

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on: [qdrn-radar]

volumes:
  uf_globe_history:
